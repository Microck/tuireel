<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Icon: Film reel frame with terminal prompt (light background variant) -->
  <g transform="translate(10, 10)">
    <!-- Outer rounded rectangle (reel frame) -->
    <rect x="0" y="0" width="100" height="100" rx="18" ry="18" fill="#06B6D4"/>
    <!-- Inner dark screen area -->
    <rect x="12" y="12" width="76" height="76" rx="8" ry="8" fill="#0F172A"/>
    <!-- Terminal chevron > -->
    <polyline points="28,38 46,50 28,62" fill="none" stroke="#06B6D4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cursor underscore _ -->
    <line x1="52" y1="62" x2="72" y2="62" stroke="#F59E0B" stroke-width="6" stroke-linecap="round"/>
    <!-- Film sprocket holes -->
    <circle cx="10" cy="20" r="4" fill="#0F172A"/>
    <circle cx="10" cy="80" r="4" fill="#0F172A"/>
    <circle cx="90" cy="20" r="4" fill="#0F172A"/>
    <circle cx="90" cy="80" r="4" fill="#0F172A"/>
  </g>
  <!-- Wordmark - dark text for light backgrounds -->
  <text x="130" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#1E293B" letter-spacing="-1">tuireel</text>
</svg>
