name: Bug report
description: Report an issue with Tuireel
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect to happen instead?
      placeholder: |
        When I run `tuireel render demo.jsonc`, the output video...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config to reproduce
      description: Paste the `.tuireel.jsonc` config that triggers this bug.
      render: jsonc
    validations:
      required: true

  - type: textarea
    id: system-info
    attributes:
      label: System info
      description: "Run `tuireel --version`, `node -v`, `ffmpeg -version` and paste the output."
      render: shell
      placeholder: |
        tuireel: 1.0.0
        node: v22.0.0
        os: macOS 15.3 arm64
        ffmpeg: 7.1
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste any error messages or stderr output.
      render: shell
    validations:
      required: false
