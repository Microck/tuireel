name: Video Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  video-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Cleanup smoke outputs
        run: rm -f smoke-output.*

      - name: Record MP4
        run: |
          node packages/cli/dist/index.js record packages/core/test/fixtures/smoke.tuireel.jsonc --format mp4
          test -s smoke-output.mp4

      - name: Record WebM
        run: |
          node packages/cli/dist/index.js record packages/core/test/fixtures/smoke.tuireel.jsonc --format webm
          test -s smoke-output.webm

      - name: Record GIF
        run: |
          node packages/cli/dist/index.js record packages/core/test/fixtures/smoke.tuireel.jsonc --format gif
          test -s smoke-output.gif

      - name: Validate MP4
        run: |
          ffprobe -v quiet -print_format json -show_format -show_streams smoke-output.mp4 > mp4-probe.json
          node -e "
            const p = require('./mp4-probe.json');
            const v = p.streams.find(s => s.codec_type === 'video');
            console.assert(v, 'Expected a video stream in MP4 probe');

            const asPositiveFinite = (value) => {
              if (value === undefined || value === null) return null;
              if (typeof value === 'string') {
                const trimmed = value.trim();
                if (!trimmed || trimmed === 'N/A') return null;
                value = trimmed;
              }
              const n = Number(value);
              if (!Number.isFinite(n) || n <= 0) return null;
              return n;
            };

            const parseFps = (rate) => {
              if (rate === undefined || rate === null) return null;
              if (typeof rate !== 'string') return asPositiveFinite(rate);
              const trimmed = rate.trim();
              if (!trimmed || trimmed === 'N/A') return null;
              if (trimmed.includes('/')) {
                const [numStr, denStr] = trimmed.split('/');
                const num = Number(numStr);
                const den = Number(denStr);
                if (!Number.isFinite(num) || !Number.isFinite(den) || den <= 0) return null;
                return asPositiveFinite(num / den);
              }
              return asPositiveFinite(trimmed);
            };

            const fps = parseFps(v.avg_frame_rate) ?? parseFps(v.r_frame_rate);
            const frames = asPositiveFinite(v.nb_frames);

            const durationSeconds =
              asPositiveFinite(p.format && p.format.duration) ??
              asPositiveFinite(v.duration) ??
              (frames && fps ? frames / fps : null);

            console.assert(v.codec_name === 'h264', 'MP4 codec should be h264, got: ' + v.codec_name);
            console.assert(parseInt(v.width) > 0, 'Width should be > 0');
            console.assert(parseInt(v.height) > 0, 'Height should be > 0');
            console.assert(durationSeconds !== null && durationSeconds > 0.01, 'Duration should be > 0 (durationSeconds=' + durationSeconds + ')');
            console.log('MP4 OK:', v.codec_name, v.width + 'x' + v.height, durationSeconds + 's');
          "

      - name: Validate WebM
        run: |
          ffprobe -v quiet -print_format json -show_format -show_streams smoke-output.webm > webm-probe.json
          node -e "
            const p = require('./webm-probe.json');
            const v = p.streams.find(s => s.codec_type === 'video');
            console.assert(v, 'Expected a video stream in WebM probe');

            const asPositiveFinite = (value) => {
              if (value === undefined || value === null) return null;
              if (typeof value === 'string') {
                const trimmed = value.trim();
                if (!trimmed || trimmed === 'N/A') return null;
                value = trimmed;
              }
              const n = Number(value);
              if (!Number.isFinite(n) || n <= 0) return null;
              return n;
            };

            const parseFps = (rate) => {
              if (rate === undefined || rate === null) return null;
              if (typeof rate !== 'string') return asPositiveFinite(rate);
              const trimmed = rate.trim();
              if (!trimmed || trimmed === 'N/A') return null;
              if (trimmed.includes('/')) {
                const [numStr, denStr] = trimmed.split('/');
                const num = Number(numStr);
                const den = Number(denStr);
                if (!Number.isFinite(num) || !Number.isFinite(den) || den <= 0) return null;
                return asPositiveFinite(num / den);
              }
              return asPositiveFinite(trimmed);
            };

            const fps = parseFps(v.avg_frame_rate) ?? parseFps(v.r_frame_rate);
            const frames = asPositiveFinite(v.nb_frames);

            const durationSeconds =
              asPositiveFinite(p.format && p.format.duration) ??
              asPositiveFinite(v.duration) ??
              (frames && fps ? frames / fps : null);

            console.assert(v.codec_name === 'vp9' || v.codec_name === 'vp8', 'WebM codec should be vp8/vp9, got: ' + v.codec_name);
            console.assert(parseInt(v.width) > 0, 'Width should be > 0');
            console.assert(parseInt(v.height) > 0, 'Height should be > 0');
            console.assert(durationSeconds !== null && durationSeconds > 0.01, 'Duration should be > 0 (durationSeconds=' + durationSeconds + ')');
            console.log('WebM OK:', v.codec_name, v.width + 'x' + v.height, durationSeconds + 's');
          "

      - name: Validate GIF
        run: |
          ffprobe -v quiet -print_format json -show_format -show_streams smoke-output.gif > gif-probe.json
          node -e "
            const p = require('./gif-probe.json');
            const v = p.streams.find(s => s.codec_type === 'video');
            console.assert(v, 'Expected a video stream in GIF probe');

            const asPositiveFinite = (value) => {
              if (value === undefined || value === null) return null;
              if (typeof value === 'string') {
                const trimmed = value.trim();
                if (!trimmed || trimmed === 'N/A') return null;
                value = trimmed;
              }
              const n = Number(value);
              if (!Number.isFinite(n) || n <= 0) return null;
              return n;
            };

            const parseFps = (rate) => {
              if (rate === undefined || rate === null) return null;
              if (typeof rate !== 'string') return asPositiveFinite(rate);
              const trimmed = rate.trim();
              if (!trimmed || trimmed === 'N/A') return null;
              if (trimmed.includes('/')) {
                const [numStr, denStr] = trimmed.split('/');
                const num = Number(numStr);
                const den = Number(denStr);
                if (!Number.isFinite(num) || !Number.isFinite(den) || den <= 0) return null;
                return asPositiveFinite(num / den);
              }
              return asPositiveFinite(trimmed);
            };

            const fps = parseFps(v.avg_frame_rate) ?? parseFps(v.r_frame_rate);
            const frames = asPositiveFinite(v.nb_frames);

            const durationSeconds =
              asPositiveFinite(p.format && p.format.duration) ??
              asPositiveFinite(v.duration) ??
              (frames && fps ? frames / fps : null);

            console.assert(v.codec_name === 'gif', 'GIF codec should be gif, got: ' + v.codec_name);
            console.assert(parseInt(v.width) > 0, 'Width should be > 0');
            console.assert(parseInt(v.height) > 0, 'Height should be > 0');
            console.assert(durationSeconds !== null && durationSeconds > 0.01, 'Duration should be > 0 (durationSeconds=' + durationSeconds + ')');
            console.log('GIF OK:', v.codec_name, v.width + 'x' + v.height, durationSeconds + 's');
          "

      - name: Upload video artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-videos
          path: |
            smoke-output.*
            *-probe.json
          retention-days: 7
