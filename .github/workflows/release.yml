name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - uses: oven-sh/setup-bun@v2

      - run: pnpm build

      - name: Publish smoke test
        run: pnpm -w publish:smoke

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN needed — uses OIDC trusted publishing.
          # Configure trusted publishers at npmjs.com for each package.

      - name: Post-publish validation
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -e "console.log(require('./packages/cli/package.json').version)")
          echo "Validating published tuireel@${VERSION}"
          for attempt in 1 2 3 4 5; do
            echo "Attempt ${attempt}/5..."
            if npx -y "tuireel@${VERSION}" --help && \
               npx -y "tuireel@${VERSION}" --version && \
               bunx "tuireel@${VERSION}" --help && \
               bunx "tuireel@${VERSION}" --version; then
              echo "Post-publish validation passed on attempt ${attempt}"
              exit 0
            fi
            echo "Attempt ${attempt} failed, sleeping $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "Post-publish validation failed after 5 attempts"
          exit 1

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -e "console.log(require('./packages/core/package.json').version)")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
